name: 编译 LEDE 固件 (华思飞 WH3000)

on:
  workflow_dispatch:
    inputs:
      ssh:
        description: '是否开启SSH调试（通常选No）'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

env:
  REPO_URL: https://github.com/coolsnowwolf/lede
  REPO_BRANCH: master
  CONFIG_FILE: optimized.config
  DIY_P1_SH: diy-part1.sh
  DIY_P2_SH: diy-part2.sh
  UPLOAD_RELEASE: true
  UPLOAD_ARTIFACTS: true
  SEND_TELEGRAM: false
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360
    permissions:
      contents: write          # 必须，允许创建 Release

    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 初始化编译环境
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo -E apt-get -qq update
          sudo -E apt-get -qq install -y \
            ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential \
            bzip2 ccache clang cmake cpio curl device-tree-compiler ecj fastjar flex \
            gawk gettext gcc-multilib g++-multilib git gnutls-dev gperf haveged help2man \
            intltool jq lib32gcc-s1 libc6-dev-i386 libelf-dev libglib2.0-dev libgmp3-dev \
            libltdl-dev libmpc-dev libmpfr-dev libncurses5-dev libncursesw5 libncursesw5-dev \
            libpython3-dev libreadline-dev libssl-dev libtool libz-dev lld llvm lrzsz \
            mkisofs msmtp nano ninja-build p7zip p7zip-full patch pkgconf python3 \
            python3-pip python3-ply python3-pyelftools qemu-utils re2c rsync scons \
            squashfs-tools subversion swig texinfo uglifyjs unzip vim wget xmlto xxd zlib1g-dev
          sudo -E apt-get -qq autoremove --purge
          sudo -E apt-get -qq clean
          sudo timedatectl set-timezone "$TZ"
          sudo mkdir -p /workdir
          sudo chown $USER:$GROUPS /workdir

      - name: 释放磁盘空间
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force 2>/dev/null || true

      - name: 克隆 LEDE 源码
        working-directory: /workdir
        run: |
          git clone $REPO_URL -b $REPO_BRANCH lede --single-branch --depth=1
          ln -sf /workdir/lede $GITHUB_WORKSPACE/lede

      - name: 执行 DIY 脚本第一部分（添加软件源）
        run: |
          chmod +x $DIY_P1_SH
          cd lede
          $GITHUB_WORKSPACE/$DIY_P1_SH

      - name: 更新并安装软件包
        run: |
          cd lede
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: 复制配置文件并执行 DIY 脚本第二部分
        run: |
          [ -e files ] && mv files lede/files
          [ -e $CONFIG_FILE ] && mv $CONFIG_FILE lede/.config
          chmod +x $DIY_P2_SH
          cd lede
          $GITHUB_WORKSPACE/$DIY_P2_SH

      - name: SSH 远程调试（可选）
        uses: P3TERX/ssh2actions@v1.0.0
        if: (github.event.inputs.ssh == 'true' && github.event_name == 'workflow_dispatch')
        env:
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}

      - name: 加载配置
        run: |
          cd lede
          make defconfig
          ./scripts/diffconfig.sh

      - name: 下载编译依赖包
        run: |
          cd lede
          make download -j8
          find dl -size -1024c -exec rm -f {} \;

      - name: 编译固件
        id: compile
        run: |
          cd lede
          make -j$(nproc) || make -j1 V=s
          echo "status=success" >> $GITHUB_OUTPUT
          grep '^CONFIG_TARGET.*DEVICE.*=y' .config | sed -r 's/.*DEVICE_(.*)=y/\1/' > DEVICE_NAME
          [ -s DEVICE_NAME ] && echo "DEVICE_NAME=$(cat DEVICE_NAME)" >> $GITHUB_ENV
          echo "FILE_DATE=$(date +"%Y%m%d%H%M")" >> $GITHUB_ENV

      - name: 整理固件文件
        id: organize
        if: steps.compile.outputs.status == 'success'
        run: |
          # 设备固件实际路径（根据你的平台 mediatek/filogic）
          cd lede/bin/targets/mediatek/filogic
          rm -rf packages
          echo "FIRMWARE=$(pwd)" >> $GITHUB_ENV
          # 输出文件列表以便调试
          echo "固件目录内容："
          ls -lh
          echo "status=success" >> $GITHUB_OUTPUT

      - name: 上传固件到 Artifacts
        uses: actions/upload-artifact@v4
        if: steps.organize.outputs.status == 'success' && env.UPLOAD_ARTIFACTS == 'true'
        with:
          name: LEDE_${{ env.DEVICE_NAME }}_${{ env.FILE_DATE }}
          path: ${{ env.FIRMWARE }}

      - name: 创建 Release 标签
        id: tag
        if: steps.organize.outputs.status == 'success' && env.UPLOAD_RELEASE == 'true'
        run: |
          echo "release_tag=$(date +"%Y.%m.%d-%H%M")" >> $GITHUB_OUTPUT
          cat > release.txt << EOF
          📦 华思飞 WH3000 LEDE 固件
          🕒 编译时间：$(date +"%Y年%m月%d日 %H:%M")
          🔧 源码：Lean's LEDE ($REPO_BRANCH)
          ✅ 已包含功能：Design 主题 / Docker / Lucky / Qmodem / DDNS 等
          📌 刷机注意：请备份当前配置再刷入！
          EOF

      - name: 上传固件到 GitHub Release
        uses: softprops/action-gh-release@v1
        if: steps.tag.outputs.status == 'success' && env.UPLOAD_RELEASE == 'true'
        with:
          tag_name: ${{ steps.tag.outputs.release_tag }}
          body_path: release.txt
          files: ${{ env.FIRMWARE }}/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 清理旧的 Releases
        uses: dev-drprasad/delete-older-releases@v0.3.4
        if: env.UPLOAD_RELEASE == 'true'
        with:
          keep_latest: 5
          delete_tags: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
